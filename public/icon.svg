<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #84A98C; }
      .tent { fill: #FFFFFF; }
      .tent-accent { fill: #E9C46A; }
      .sparkle { fill: #E9C46A; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #2F3E46; }
      .tent { fill: #84A98C; }
      .tent-accent { fill: #E9C46A; }
      .sparkle { fill: #E9C46A; }
    }
  </style>
  
  <!-- Rounded background -->
  <rect class="background" width="180" height="180" rx="36" />
  
  <!-- Camping Tent with AI Sparkles -->
  <g transform="translate(90, 100)">
    <!-- Main Tent Triangle -->
    <path class="tent" d="M-55 25 L0 -45 L55 25 Z" fill-opacity="0.95"/>
    
    <!-- Tent Door Opening -->
    <path class="background" d="M-22 25 L0 5 L22 25 Z" fill-opacity="0.3"/>
    
    <!-- Tent Door Frame -->
    <path class="tent" d="M-22 25 L0 5 L22 25" stroke="currentColor" stroke-width="2" fill="none" opacity="0.4"/>
    
    <!-- Tent Poles (subtle) -->
    <line x1="-35" y1="25" x2="-35" y2="-25" stroke="currentColor" stroke-width="2.5" class="tent" opacity="0.3"/>
    <line x1="35" y1="25" x2="35" y2="-25" stroke="currentColor" stroke-width="2.5" class="tent" opacity="0.3"/>
    
    <!-- AI Sparkles (representing AI intelligence) -->
    <g class="sparkle">
      <!-- Top sparkle -->
      <circle cx="0" cy="-55" r="5" opacity="0.9">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Left sparkle -->
      <circle cx="-40" cy="-40" r="4" opacity="0.85">
        <animate attributeName="opacity" values="0.5;0.95;0.5" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <!-- Right sparkle -->
      <circle cx="40" cy="-40" r="4" opacity="0.85">
        <animate attributeName="opacity" values="0.5;0.95;0.5" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
      </circle>
      <!-- Small accent sparkles -->
      <circle cx="-50" cy="-20" r="2.5" opacity="0.7"/>
      <circle cx="50" cy="-20" r="2.5" opacity="0.7"/>
    </g>
    
    <!-- Ground line (subtle) -->
    <line x1="-60" y1="25" x2="60" y2="25" stroke="currentColor" stroke-width="1.5" class="tent" opacity="0.2"/>
  </g>
</svg>
